<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PR Review Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
      color: #333;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      background: white;
      border-radius: 12px;
      padding: 30px;
      margin-bottom: 30px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    }

    h1 {
      color: #667eea;
      margin-bottom: 8px;
      font-size: 28px;
    }

    .subtitle {
      color: #999;
      font-size: 14px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      border-left: 4px solid #667eea;
    }

    .stat-card.critical {
      border-left-color: #ff4444;
    }

    .stat-card.high {
      border-left-color: #ff9900;
    }

    .stat-card.success {
      border-left-color: #44bb44;
    }

    .stat-value {
      font-size: 32px;
      font-weight: bold;
      color: #667eea;
      margin-bottom: 8px;
    }

    .stat-label {
      color: #999;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .reviews-section {
      background: white;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    }

    .section-title {
      font-size: 20px;
      margin-bottom: 20px;
      color: #333;
    }

    .review-list {
      list-style: none;
    }

    .review-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 15px;
      border-bottom: 1px solid #eee;
      transition: background 0.2s;
    }

    .review-item:hover {
      background: #f9f9f9;
    }

    .review-info {
      flex: 1;
    }

    .review-title {
      font-weight: 600;
      color: #333;
      margin-bottom: 4px;
    }

    .review-meta {
      font-size: 12px;
      color: #999;
    }

    .review-verdict {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .verdict-approve {
      background: #d4edda;
      color: #155724;
    }

    .verdict-comment {
      background: #cce5ff;
      color: #004085;
    }

    .verdict-changes {
      background: #f8d7da;
      color: #721c24;
    }

    .finding-counts {
      display: flex;
      gap: 10px;
      font-size: 12px;
    }

    .finding-count {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .count-badge {
      display: inline-block;
      min-width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: bold;
      color: white;
    }

    .critical { background: #ff4444; }
    .high { background: #ff9900; }
    .medium { background: #ffcc00; }
    .low { background: #44bb44; }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #999;
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .chart-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 30px;
    }

    .chart {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    }

    .chart-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 15px;
      color: #333;
    }

    .bar {
      display: flex;
      align-items: center;
      margin-bottom: 12px;
    }

    .bar-label {
      width: 100px;
      font-size: 13px;
      font-weight: 500;
    }

    .bar-fill {
      flex: 1;
      background: linear-gradient(90deg, #667eea, #764ba2);
      height: 24px;
      border-radius: 4px;
      margin: 0 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 11px;
      font-weight: 600;
    }

    .bar-value {
      width: 50px;
      text-align: right;
      font-size: 13px;
      font-weight: 600;
      color: #667eea;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #999;
    }

    @media (max-width: 768px) {
      .stats-grid {
        grid-template-columns: 1fr 1fr;
      }

      .chart-container {
        grid-template-columns: 1fr;
      }

      header {
        padding: 20px;
      }

      .reviews-section {
        padding: 20px;
      }

      .review-item {
        flex-direction: column;
        align-items: flex-start;
      }

      .review-verdict {
        margin-top: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🔍 PR Review Dashboard</h1>
      <p class="subtitle">Security analysis and review history</p>
    </header>

    <div id="stats-container" class="stats-grid">
      <div class="loading">Loading statistics...</div>
    </div>

    <div class="chart-container">
      <div class="chart">
        <div class="chart-title">Reviews by Verdict</div>
        <div id="verdict-chart"></div>
      </div>

      <div class="chart">
        <div class="chart-title">Reviews by Repository</div>
        <div id="repo-chart"></div>
      </div>
    </div>

    <div class="reviews-section">
      <h2 class="section-title">Recent Reviews</h2>
      <ul id="reviews-list" class="review-list">
        <div class="loading">Loading reviews...</div>
      </ul>
    </div>
  </div>

  <script>
    async function loadStats() {
      try {
        const response = await fetch('/api/stats');
        const data = await response.json();

        renderStats(data.stats);
        renderCharts(data.byVerdictType, data.byRepo);
      } catch (error) {
        console.error('Failed to load stats:', error);
      }
    }

    function renderStats(stats) {
      const container = document.getElementById('stats-container');

      const cards = [
        {
          label: 'Total Reviews',
          value: stats.totalReviews,
          className: 'success',
        },
        {
          label: 'Critical Issues',
          value: stats.criticalIssues,
          className: 'critical',
        },
        {
          label: 'High Issues',
          value: stats.highIssues,
          className: 'high',
        },
        {
          label: 'Approval Rate',
          value: `${stats.approvalRate}%`,
          className: 'success',
        },
      ];

      container.innerHTML = cards
        .map(
          card => `
        <div class="stat-card ${card.className}">
          <div class="stat-value">${card.value}</div>
          <div class="stat-label">${card.label}</div>
        </div>
      `
        )
        .join('');
    }

    function renderCharts(verdictCounts, repoCounts) {
      renderVerdictChart(verdictCounts);
      renderRepoChart(repoCounts);
    }

    function renderVerdictChart(verdictCounts) {
      const container = document.getElementById('verdict-chart');
      const total = Object.values(verdictCounts).reduce((a, b) => a + b, 0) || 1;

      const bars = Object.entries(verdictCounts)
        .map(
          ([label, count]) => `
        <div class="bar">
          <div class="bar-label">${label}</div>
          <div class="bar-fill" style="width: ${(count / total) * 100}%">
            ${count > 0 ? count : ''}
          </div>
          <div class="bar-value">${count}</div>
        </div>
      `
        )
        .join('');

      container.innerHTML = bars || '<p style="color: #ccc;">No data yet</p>';
    }

    function renderRepoChart(repoCounts) {
      const container = document.getElementById('repo-chart');
      const total = Object.values(repoCounts).reduce((a, b) => a + b, 0) || 1;

      const bars = Object.entries(repoCounts)
        .slice(0, 5)
        .map(
          ([label, count]) => `
        <div class="bar">
          <div class="bar-label" title="${label}">${label.split('/')[1] || label}</div>
          <div class="bar-fill" style="width: ${(count / total) * 100}%">
            ${count > 0 ? count : ''}
          </div>
          <div class="bar-value">${count}</div>
        </div>
      `
        )
        .join('');

      container.innerHTML = bars || '<p style="color: #ccc;">No data yet</p>';
    }

    async function loadReviews() {
      try {
        const response = await fetch('/api/reviews?limit=10');
        const data = await response.json();

        renderReviews(data.reviews);
      } catch (error) {
        console.error('Failed to load reviews:', error);
      }
    }

    function renderReviews(reviews) {
      const container = document.getElementById('reviews-list');

      if (reviews.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">📝</div>
            <p>No reviews yet. Check back after running PR reviews!</p>
          </div>
        `;
        return;
      }

      container.innerHTML = reviews
        .map(review => {
          const verdictClass = `verdict-${review.verdict.toLowerCase().replace('_', '-')}`;
          const stats = review.stats || {};

          return `
          <li class="review-item">
            <div class="review-info">
              <a href="${review.url}" target="_blank" style="color: #667eea; text-decoration: none;">
                <div class="review-title">${review.title}</div>
              </a>
              <div class="review-meta">
                ${review.repo} • ${new Date(review.timestamp).toLocaleDateString()}
              </div>
              <div class="finding-counts">
                ${stats.critical > 0 ? `<span class="finding-count"><span class="count-badge critical">${stats.critical}</span> Critical</span>` : ''}
                ${stats.high > 0 ? `<span class="finding-count"><span class="count-badge high">${stats.high}</span> High</span>` : ''}
                ${stats.medium > 0 ? `<span class="finding-count"><span class="count-badge medium">${stats.medium}</span> Medium</span>` : ''}
              </div>
            </div>
            <span class="review-verdict ${verdictClass}">${review.verdict}</span>
          </li>
        `;
        })
        .join('');
    }

    // Initial load
    loadStats();
    loadReviews();

    // Refresh every 30 seconds
    setInterval(() => {
      loadStats();
      loadReviews();
    }, 30000);
  </script>
</body>
</html>
