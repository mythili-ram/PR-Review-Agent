name: 🔄 Continuous Demo

# Automatically runs on every push to show it works
on:
  push:
    branches: [main, master]
  schedule:
    # Run daily at 9 AM UTC to keep demo fresh
    - cron: '0 9 * * *'

permissions:
  contents: read

jobs:
  continuous-demo:
    name: 🎯 Automated Demo (All Fixtures)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        fixture: ['sample.patch', 'safe-pr.patch', 'docs-only.patch']
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install
        run: npm ci

      - name: ✅ Validate Structure
        if: matrix.fixture == 'sample.patch'
        run: npm run validate

      - name: ⚡ Run Heuristic Scan - ${{ matrix.fixture }}
        run: |
          echo "Analyzing: ${{ matrix.fixture }}"
          npm run heuristics -- fixtures/${{ matrix.fixture }} > results-${{ matrix.fixture }}.json
          cat results-${{ matrix.fixture }}.json

      - name: 🧠 Run ML Analysis - ${{ matrix.fixture }}
        run: |
          npm run ml:analyze -- fixtures/${{ matrix.fixture }} > ml-${{ matrix.fixture }}.json
          cat ml-${{ matrix.fixture }}.json

      - name: 📊 Summary - ${{ matrix.fixture }}
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📦 Fixture: ${{ matrix.fixture }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          jq -r '"🔴 Critical: \(.stats.critical // 0)\n🟡 Warnings: \(.stats.warning // 0)\n📋 Verdict: \(.verdict // \"UNKNOWN\")"' results-${{ matrix.fixture }}.json

      - name: 📤 Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: demo-results-${{ matrix.fixture }}
          path: |
            results-${{ matrix.fixture }}.json
            ml-${{ matrix.fixture }}.json

  summary:
    name: 📊 Demo Summary
    needs: continuous-demo
    runs-on: ubuntu-latest
    steps:
      - name: 🎉 All Tests Complete
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  ✅ PR-Review-Agent Demo Suite Complete"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "✓ Vulnerable code (sample.patch) - Detected issues"
          echo "✓ Safe code (safe-pr.patch) - Clean scan"
          echo "✓ Docs only (docs-only.patch) - No security issues"
          echo ""
          echo "View detailed results in the Artifacts section above ⬆️"
          echo ""
