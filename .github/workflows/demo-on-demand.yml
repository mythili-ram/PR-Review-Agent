name: 🎬 Live Demo (On-Demand)

# Judges can click "Run workflow" to see the demo in action
on:
  workflow_dispatch:
    inputs:
      fixture:
        description: 'Which fixture to analyze'
        required: true
        default: 'sample.patch'
        type: choice
        options:
          - sample.patch
          - safe-pr.patch
          - docs-only.patch

permissions:
  contents: read

jobs:
  demo:
    name: 🎯 Live Security Review Demo
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: ✅ Step 1 - Validate Agent Structure
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  STEP 1: Validate GitAgent Structure"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          npm run validate
          echo ""

      - name: ⚡ Step 2 - Fast Heuristic Scan (0.1s, no API)
        id: heuristics
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  STEP 2: Fast Heuristic Security Scan"
          echo "  • 15+ security patterns"
          echo "  • OWASP Top 10 coverage"
          echo "  • Zero API calls (completely offline)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          npm run heuristics -- fixtures/${{ inputs.fixture }} | tee heuristic-results.json
          echo ""

          # Extract key metrics
          CRITICAL=$(jq -r '.stats.critical // 0' heuristic-results.json)
          WARNING=$(jq -r '.stats.warning // 0' heuristic-results.json)
          VERDICT=$(jq -r '.verdict // "UNKNOWN"' heuristic-results.json)

          echo "📊 RESULTS SUMMARY:"
          echo "  🔴 Critical: $CRITICAL"
          echo "  🟡 Warnings: $WARNING"
          echo "  📋 Verdict: $VERDICT"
          echo ""

      - name: 🧠 Step 3 - ML Anomaly Detection
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  STEP 3: ML Anomaly Detection"
          echo "  • Z-score statistical analysis"
          echo "  • Complexity metrics"
          echo "  • Code entropy analysis"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          npm run ml:analyze -- fixtures/${{ inputs.fixture }} | tee ml-results.json
          echo ""

      - name: 📊 Step 4 - Generate Summary Report
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  🎯 DEMO COMPLETE"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "✅ Agent structure validated"
          echo "✅ Security scan completed in ~0.1 seconds"
          echo "✅ ML analysis completed"
          echo ""
          echo "📦 What was analyzed: fixtures/${{ inputs.fixture }}"
          echo ""
          echo "🔍 Key Findings:"
          jq -r '.findings[] | "  \(.severity): \(.message)"' heuristic-results.json 2>/dev/null || echo "  No issues found"
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  📚 What This Demonstrates"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "✓ Git-native agent (SOUL, RULES, skills all in git)"
          echo "✓ OWASP Top 10 coverage with CWE mappings"
          echo "✓ Fast offline scan (no API needed)"
          echo "✓ ML-based anomaly detection"
          echo "✓ Production-ready CI/CD integration"
          echo "✓ Multi-AI provider support (Claude, GPT, Gemini)"
          echo ""
          echo "💰 Cost: \$0.00 (heuristics) | \$0.03 (with AI review)"
          echo "⚡ Speed: 0.1 seconds (heuristics) | 5-10s (AI review)"
          echo ""

      - name: 📤 Upload Results as Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: demo-results-${{ inputs.fixture }}
          path: |
            heuristic-results.json
            ml-results.json
          retention-days: 30

      - name: 🎉 Demo Summary
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  🏆 Thank You for Watching!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "📖 Full documentation: https://github.com/${{ github.repository }}"
          echo "🎬 For AI review with Claude: Add ANTHROPIC_API_KEY secret"
          echo "📦 Download artifacts above to see detailed JSON results"
          echo ""
          echo "Ready to use in your own repos? Just copy .github/workflows/"
          echo ""
