name: Validate Agent Structure

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  validate:
    name: Validate GitAgent Structure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate agent structure
        run: npm run validate

      - name: Test heuristics
        run: npm run heuristics

      - name: Validate with gitagent CLI (if available)
        continue-on-error: true
        run: npm run validate:gitagent
