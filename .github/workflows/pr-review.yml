name: 🤖 PR Guardian - AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:  # Allow manual trigger for demo

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  # Fast heuristic scan (0.1s, no API key needed)
  heuristic-scan:
    name: ⚡ Fast Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Get PR diff
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff origin/${{ github.base_ref }}...HEAD > pr.patch
          echo "PR diff size: $(wc -l < pr.patch) lines"

      - name: Run heuristic security scan
        id: scan
        run: |
          echo "🔍 Running fast heuristic scan (no LLM needed)..."

          # Run heuristics on PR diff
          npm run --silent heuristics -- pr.patch > heuristic-results.json || true

          # Display results
          echo "📊 Scan Results:"
          cat heuristic-results.json | jq '.'

      - name: Format results for PR comment
        id: format
        run: |
          # Extract key data
          VERDICT=$(jq -r '.verdict // "APPROVE"' heuristic-results.json)
          CRITICAL=$(jq -r '.stats.critical // 0' heuristic-results.json)
          WARNING=$(jq -r '.stats.warning // 0' heuristic-results.json)
          TOTAL=$(jq -r '.stats.total // 0' heuristic-results.json)

          # Create markdown report
          cat > review-comment.md << 'EOF'
          ## 🤖 PR Guardian Review

          **Verdict:** `$VERDICT`
          **Security Scan:** $CRITICAL critical, $WARNING warnings, $TOTAL total findings

          EOF

          # Add findings if any
          if [ "$TOTAL" -gt 0 ]; then
            echo "" >> review-comment.md
            echo "### 🔍 Findings" >> review-comment.md
            echo "" >> review-comment.md

            jq -r '.findings[] | "#### \(.severity): \(.rule_id)\n- **Category:** \(.category)\n- **CWE:** \(.cwe)\n- **Issue:** \(.message)\n"' heuristic-results.json >> review-comment.md
          fi

          # Add memory context
          cat >> review-comment.md << 'EOF'

          ---

          ### 🧠 Historical Context (Git-Native Memory)

          This agent learns from YOUR git history:
          - ✅ References past violations from [memory/previous-violations.md](../blob/main/memory/previous-violations.md)
          - ✅ Checks team decisions from [memory/key-decisions.md](../blob/main/memory/key-decisions.md)
          - ✅ Enforces standards from [memory/repository-standards.md](../blob/main/memory/repository-standards.md)

          **Example:** If SQL injection detected, agent cites: *"Similar issue in PR #123 (commit abc123)"*

          ### 🔄 Self-Improving Agent

          When this agent finds the same issue **3+ times**, it proposes a PR to update its own rules:
          - 📝 Generates PR description with evidence
          - 👥 Human approves via standard git workflow
          - 🔒 Safe, transparent, auditable AI evolution

          See [skills/propose-rule-update/](../blob/main/skills/propose-rule-update/SKILL.md)

          ---

          ### ⚡ Performance
          - **Scan time:** ~0.1 seconds (heuristics only)
          - **Coverage:** OWASP Top 10, CWE patterns
          - **False positives:** Low (pattern-based + AI validation)

          ### 🎯 Detection Coverage
          - ✅ Hardcoded secrets (API keys, AWS credentials, JWTs)
          - ✅ SQL injection (template literals, string concatenation)
          - ✅ XSS (dangerouslySetInnerHTML, innerHTML)
          - ✅ Weak crypto (MD5, SHA1, Math.random)
          - ✅ Missing authentication/authorization
          - ✅ Path traversal & SSRF

          ---

          *🏆 Powered by [PR Guardian](https://github.com/mythili-ram/PR-Review-Agent) - GitAgent Hackathon 2026*
          *The only PR bot that learns from YOUR git history and proposes PRs to improve itself*
          EOF

          # Substitute variables
          sed -i "s/\$VERDICT/$VERDICT/g" review-comment.md
          sed -i "s/\$CRITICAL/$CRITICAL/g" review-comment.md
          sed -i "s/\$WARNING/$WARNING/g" review-comment.md
          sed -i "s/\$TOTAL/$TOTAL/g" review-comment.md

          cat review-comment.md

      - name: Post review as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('review-comment.md', 'utf8');

            // Find existing bot comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('PR Guardian Review')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: review
              });
              console.log('✅ Updated existing review comment');
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: review
              });
              console.log('✅ Posted new review comment');
            }

      - name: Upload scan results
        uses: actions/upload-artifact@v4
        with:
          name: pr-guardian-scan-results
          path: |
            heuristic-results.json
            review-comment.md
            pr.patch

      - name: Check for critical issues
        run: |
          CRITICAL_COUNT=$(jq -r '.stats.critical // 0' heuristic-results.json)
          VERDICT=$(jq -r '.verdict // "APPROVE"' heuristic-results.json)

          echo "📊 Final Results:"
          echo "  - Verdict: $VERDICT"
          echo "  - Critical issues: $CRITICAL_COUNT"

          if [ "$CRITICAL_COUNT" -ge 1 ]; then
            echo ""
            echo "❌ BLOCKING: Found $CRITICAL_COUNT critical security issue(s)"
            echo ""
            jq -r '.findings[] | select(.severity == "CRITICAL") | "  🔴 \(.rule_id): \(.message)"' heuristic-results.json
            echo ""
            echo "⚠️  This PR cannot be merged until critical issues are resolved"
            exit 1
          fi

          echo ""
          echo "✅ Security scan passed - no critical issues"
          echo "✅ PR is safe to merge"

  # Validate agent structure
  validate-agent:
    name: 🧪 Validate GitAgent Structure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate agent structure
        run: |
          echo "🔍 Validating GitAgent structure..."
          npm run validate

          echo ""
          echo "✅ Agent structure is valid"
          echo "✅ All skills detected:"
          npm run validate | grep "skills:"

      - name: Check memory system
        run: |
          echo "🧠 Checking git-native memory system..."

          if [ -f "memory/MEMORY.md" ] && \
             [ -f "memory/key-decisions.md" ] && \
             [ -f "memory/previous-violations.md" ] && \
             [ -f "memory/repository-standards.md" ]; then
            echo "✅ Memory system is complete"
            echo "  - memory/MEMORY.md (index)"
            echo "  - memory/key-decisions.md (team decisions)"
            echo "  - memory/previous-violations.md (past incidents)"
            echo "  - memory/repository-standards.md (conventions)"
          else
            echo "❌ Memory system incomplete"
            exit 1
          fi

      - name: Check self-improvement skill
        run: |
          echo "🔄 Checking self-improvement capability..."

          if [ -f "skills/propose-rule-update/SKILL.md" ]; then
            echo "✅ Self-improvement skill present"
            echo "✅ Agent can propose PRs to update its own rules"
          else
            echo "❌ Self-improvement skill missing"
            exit 1
          fi
