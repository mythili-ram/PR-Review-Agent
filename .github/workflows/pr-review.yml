name: AI-Powered PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  heuristic-scan:
    name: Fast Security Scan (Heuristics)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Get PR diff
        id: pr-diff
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff origin/${{ github.base_ref }}...HEAD > pr.patch

      - name: Run heuristic security scan
        id: scan
        run: |
          # Filter out demo/test fixtures from security scan
          grep -v "^diff --git a/fixtures/" pr.patch > pr-filtered.patch || true
          npm run --silent heuristics -- pr-filtered.patch > heuristic-results.json
          cat heuristic-results.json

      - name: Run ML anomaly detection
        id: ml-analysis
        run: |
          npm run ml:analyze -- pr.patch > ml-anomalies.json 2>&1 || echo '{"files": [], "summary": {"total": 0}}'
          cat ml-anomalies.json

      - name: Upload scan results
        uses: actions/upload-artifact@v4
        with:
          name: heuristic-scan-results
          path: |
            heuristic-results.json
            ml-anomalies.json

      - name: Check for critical issues
        run: |
          CRITICAL_COUNT=$(jq -r '.stats.critical // 0' heuristic-results.json)
          VERDICT=$(jq -r '.verdict // "APPROVE"' heuristic-results.json)
          
          # For demo/hackathon PRs: allow REQUEST_CHANGES if issues are patterns in feature code
          # Fail only on emergency-level issues (> 3 critical OR actual secrets/keys)
          if [ "$CRITICAL_COUNT" -gt 3 ]; then
            echo "::error::Found $CRITICAL_COUNT critical security issue(s)"
            exit 1
          fi
          
          # Check for actual secrets (these always fail)
          if jq -e '.findings[]? | select(.rule_id == "secret-exposure")' heuristic-results.json > /dev/null 2>&1; then
            # Only fail if it's an actual secret with specific patterns
            SECRET_FINDING=$(jq -r '.findings[]? | select(.rule_id == "secret-exposure") | .message' heuristic-results.json | head -1)
            if [[ "$SECRET_FINDING" == *"API key"* ]] || [[ "$SECRET_FINDING" == *"token"* ]] || [[ "$SECRET_FINDING" == *"Private key"* ]]; then
              echo "::error::SECRETS EXPOSURE DETECTED: $SECRET_FINDING"
              echo "::error::Cannot merge PR with exposed credentials"
              exit 1
            fi
          fi
          
          echo "✅ Security scan passed (verdict: $VERDICT)"
          echo "  - Critical: $CRITICAL_COUNT"

  ai-review:
    name: AI-Powered Deep Review (gitclaw)
    runs-on: ubuntu-latest
    needs: heuristic-scan
    if: always() # Run even if heuristics fail, to provide full context
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Get PR diff
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff origin/${{ github.base_ref }}...HEAD > pr.patch

      - name: Download heuristic results
        uses: actions/download-artifact@v4
        with:
          name: heuristic-scan-results

      - name: Format heuristics results as review
        run: |
          node scripts/format-heuristics-review.mjs heuristic-results.json > REVIEW.md
          cat REVIEW.md

      - name: Post review as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('REVIEW.md', 'utf8');

            // Find existing bot comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('AI-Powered PR Review')
            );

            const body = `${review}\n\n---\n*Powered by [pr-review-agent](https://github.com/mythili-ram/PR-Review-Agent) • Review ID: ${context.runId}*`;

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }

      - name: Upload full review
        uses: actions/upload-artifact@v4
        with:
          name: ai-review-results
          path: REVIEW.md

      - name: Block PR if critical issues found
        run: |
          # Check if any files in the PR are NOT fixtures
          NON_FIXTURE_FILES=$(git diff origin/${{ github.base_ref }}...HEAD --name-only | grep -v '^fixtures/' | grep -v '^docs/' | grep -v '^\.dashboard-data/' | grep -v '^scripts/' || true)
          
          if [ -z "$NON_FIXTURE_FILES" ]; then
            echo "✅ Only fixture/documentation files changed - PR can be merged"
            exit 0
          fi
          
          # Real source code changed - check for critical issues
          if grep -q "CRITICAL" REVIEW.md; then
            echo "::error::🔴 CRITICAL ISSUES FOUND - PR BLOCKED"
            echo "::error::Critical security issues must be resolved before merge."
            echo "::error::See review comment above for details."
            exit 1
          fi
          echo "✅ No critical issues in source code - PR can be merged"
