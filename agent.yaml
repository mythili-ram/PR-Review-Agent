spec_version: "0.1.0"
name: pr-review-agent
version: 0.1.0
description: Policy-aware pull-request review agent — security, tests, and team rules from a git-native definition
author: hackathon
license: MIT
# gitclaw expects "provider:model" — see https://github.com/open-gitagent/gitclaw
model:
  provider: claude # Options: claude, gpt, gemini
  preferred: anthropic:claude-opus-4-1-20250805
  fallback:
    - anthropic:claude-sonnet-4-5-20250929
    - openai:gpt-4o
    - google:gemini-2.0-flash
  constraints:
    temperature: 0.2
    max_tokens: 8192
    top_p: 0.9
  # Provider-specific settings
  providers:
    claude:
      model: claude-opus-4-1-20250805
      api_key_env: ANTHROPIC_API_KEY
    gpt:
      model: gpt-4o
      api_key_env: OPENAI_API_KEY
    gemini:
      model: gemini-2.0-flash
      api_key_env: GOOGLE_API_KEY
skills:
  - ingest-pr
  - summarize-diff
  - security-pass
  - tests-and-risk
  - compose-review
tools:
  - read-diff-context
  - write-review-artifact
runtime:
  max_turns: 24
  timeout: 300
tags:
  - hackathon
  - pr-review
  - gitagent
  - developer-tools
